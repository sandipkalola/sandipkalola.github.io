<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sandipkumar Kalola Portfolio</title>
  <script type="text/javascript">
    // Extract route path and map to parameter
    var pathname = window.location.pathname;
    // Trim trailing slashes and clean
    var cleanedPath = pathname.replace(/\/$/, "");
    var route = cleanedPath.split('/').pop() || "";

    // If it's one of our special key pages
    if (route === 'terms-of-service' || route === 'privacy-policy' || route === 'cancellation-refund-policy') {
      window.location.replace('/?p=' + route);
    } else {
      // Fallback redirect to home page, preserving standard query links if present
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <p>Redirecting... If you are not redirected, <a href="/">click here</a>.</p>
</body>
</html>
